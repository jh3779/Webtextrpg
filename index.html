<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web Text RPG - 모험의 시작</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>⚔️ RPG World (가칭)</h1>
        <div id="status-window">
            <div class="status-row">
                <p>캐릭터 이름: <span id="p-name">준비 중...</span></p>
                <p>현재층: <span id="p-floor">1층</span></p>
            </div>
            <div class="status-row">
                <p>HP: <span id="p-hp">100</span>/<span id="p-maxHp">100</span></p>
                <p>공격력: <span id="p-atk">15</span></p>
            </div>
            <p>현재 상태: <span id="p-status">모험 대기 중</span></p>
        </div>
        <hr>
        <div id="log-window">

        </div>
        <hr>
        <div>
            <p><span id="action-guide">[공격: a] [회피: d] [저장: s] [불러오기: l]</span></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
