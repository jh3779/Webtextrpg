<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web Text RPG - 모험의 시작</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>⚔️ RPG World (가칭)</h1>
        <div id="status-window">
            <p>캐릭터 이름: <span id="p-name">준비 중...</span></p>
            <p>현재 상태: <span id="p-status">모험 대기 중</span></p>
        </div>
        <hr>
        <div id="log-window">
            <p>시스템: 게임이 시작되었습니다. 캐릭터를 생성하세요!</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
